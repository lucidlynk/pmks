[program:pmks-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /DATA/coding/laravel/projects/pmks-app/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/DATA/coding/laravel/projects/pmks-app/storage/logs/worker.log
stopwaitsecs=3600

[program:pmks-worker-imports]
process_name=%(program_name)s_%(process_num)02d
command=php /DATA/coding/laravel/projects/pmks-app/artisan queue:work database --queue=imports --sleep=3 --tries=3 --timeout=300 --max-jobs=500
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/DATA/coding/laravel/projects/pmks-app/storage/logs/worker-imports.log
stopwaitsecs=300
